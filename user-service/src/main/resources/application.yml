server:
  port: 8086

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:5433/users_db
    username: oms
    password: oms_dev_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 2000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6380
      timeout: 2000ms

  # JWT auth disabled until Phase 4 — generate certs/private.pem and certs/public.pem first
  # security:
  #   oauth2:
  #     resourceserver:
  #       jwt:
  #         public-key-location: classpath:certs/public.pem

# jwt:
#   private-key-location: classpath:certs/private.pem
#   access-token-expiry-seconds: 900
#   refresh-token-expiry-days: 7

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

logging:
  level:
    com.oms.user: INFO
    org.springframework.security: WARN

version: '3.9'

# Run Jenkins separately from the main stack:
#   docker compose -f docker-compose.jenkins.yml up -d
#
# Jenkins UI: http://localhost:8080
# Jenkins agent connects back to the host Docker daemon via the mounted socket.

services:

  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: oms-jenkins
    user: root                    # needed so Jenkins can use the Docker socket
    ports:
      - "8080:8080"               # Jenkins web UI
      - "50000:50000"             # Jenkins agent (JNLP) port
    volumes:
      - jenkins_home:/var/jenkins_home          # persists jobs, credentials, plugins
      - /var/run/docker.sock:/var/run/docker.sock  # lets Jenkins build Docker images
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false  # skip setup wizard (we handle it manually)
    networks:
      - jenkins-network

  # Local Docker registry — acts as a lightweight alternative to Nexus/JFrog for local dev.
  # Images are pushed here: localhost:5000/oms/order-service:latest
  # In production, replace this with your real Nexus/JFrog URL.
  registry:
    image: registry:2
    container_name: oms-registry
    ports:
      - "5001:5000"
    volumes:
      - registry_data:/var/lib/registry
    networks:
      - jenkins-network

volumes:
  jenkins_home:
  registry_data:

networks:
  jenkins-network:
    driver: bridge
